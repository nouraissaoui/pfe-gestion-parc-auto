<div class="particles-bg">
  <div class="bg-particle" *ngFor="let i of [1,2,3,4]"></div>
</div>

<header class="header">
  <div class="header-left">
    <div class="logo">
      <img src="https://tse4.mm.bing.net/th/id/OIP.DqzAYevLmA0BnSvWkDiMsQAAAA?rs=1&pid=ImgDetMain&o=7&rm=3" alt="AGIL Logo" class="logo-img" />
      <div>
        <div class="company-title">AGIL Energy</div>
        <div class="company-subtitle">Espace Chauffeur Professionnel</div>
      </div>
    </div>
  </div>

  <div class="header-right">
    <div class="user-info">
      <div class="user-avatar">{{ Nom.charAt(0) }}{{ Prenom.charAt(0) }}</div>
      <div class="user-details">
        <h3>{{ Nom }} {{ Prenom }}</h3>
        <p>{{ role }}</p>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()">⏻ Déconnexion</button>
  </div>
</header>

<aside class="sidebar">
  <h2>
    <a [routerLink]="['/chauffeur/dashboard']" style="text-decoration: none; color: inherit;">⚙ Menu</a>
  </h2>

  <div class="menu-item" [routerLink]="['/chauffeur/missions']" routerLinkActive="active">
    <span class="menu-icon">📑</span>
    <span>Mes Missions</span>
  </div>

  <div class="menu-item" [routerLink]="['/chauffeur/feuille-route']" routerLinkActive="active">
    <span class="menu-icon">📋</span>
    <span>Feuille de Route</span>
  </div>

  <div class="menu-item" [routerLink]="['/chauffeur/declarations']" routerLinkActive="active">
    <span class="menu-icon">⚠️</span>
    <span>Déclarer Incidents</span>
  </div>
</aside>

<div class="main-content">
  <router-outlet></router-outlet> </div>
