    <!-- =============================================
        CHATBOT — AGIL SNDP
        ============================================= -->

    <div class="chatbot-page">
    <div class="chat-container">

        <!-- ===== HEADER ===== -->
        <div class="chat-header">
        <div class="bot-avatar">🤖</div>
        <div class="header-info">
            <div class="bot-name">Assistant AGIL</div>
            <div class="bot-status">
            <span class="status-dot"></span>
            En ligne
            </div>
        </div>
        <div class="header-badge">AGIL</div>
        </div>

        <!-- ===== MESSAGES ===== -->
        <div class="chat-messages">

        <div *ngFor="let msg of messages"
            [class]="'message ' + (msg.sender === 'user' ? 'message-user' : 'message-bot')">
            <div class="bubble">
            <div class="msg-text" [innerHTML]="msg.text.replace('\n', '<br>')"></div>
            <div class="msg-time">{{ msg.time }}</div>
            </div>
        </div>

        <!-- Indicateur de frappe -->
        <div *ngIf="isLoading" class="message message-bot">
            <div class="bubble typing">
            <span></span><span></span><span></span>
            </div>
        </div>

        </div>

        <!-- ===== INPUT ===== -->
        <div class="chat-input">
        <input
            [(ngModel)]="userInput"
            (keydown)="onEnter($event)"
            placeholder="Tapez votre message..."
            [disabled]="isLoading"
        />
        <button (click)="sendMessage()" [disabled]="isLoading">
            ➤
        </button>
        </div>

    </div>
    </div>
