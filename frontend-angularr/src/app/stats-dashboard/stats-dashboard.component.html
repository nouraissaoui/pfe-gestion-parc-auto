<div class="stats-page">

  <div class="stats-header">
    <div class="stats-titre">
      <span class="icon">📊</span>
      <span class="titre-text">Statistiques du Parc</span>
    </div>

    <button
      class="btn-envoyer"
      [class.envoye]="rapportEnvoye"
      (click)="envoyerRapportAdmin()"
      [disabled]="rapportEnvoye">
      <ng-container *ngIf="!rapportEnvoye">
        <span class="btn-icon">📤</span>
        Envoyer le rapport à l'Admin
      </ng-container>
      <ng-container *ngIf="rapportEnvoye">
        <span class="btn-icon">✅</span>
        Rapport transmis !
      </ng-container>
    </button>
  </div>

  <div class="iframe-container">
    <iframe [src]="reportUrl" width="100%" height="100%" frameborder="0" allowFullScreen="true"></iframe>
  </div>

</div>
